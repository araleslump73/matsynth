<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatSynth - Impostazioni</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #121212; color: #e0e0e0; font-family: sans-serif; font-size: 0.9rem; }
        .card { background: #1e1e1e; border: 1px solid #333; margin-bottom: 15px; }
        .form-select { background-color: #2a2a2a; color: white; border: 1px solid #444; font-size: 0.85rem; }
        .section-title { font-size: 0.85rem; margin-bottom: 10px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body class="container py-3">

    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom border-secondary pb-2">
        <h3 class="text-white mb-0">⚙️ IMPOSTAZIONI</h3>
        <a href="/" class="btn btn-outline-light btn-sm fw-bold">🔙 MIXER</a>
    </div>

    <div class="card p-3 border-info" style="border-width: 2px;">
        <div class="section-title text-info">🌐 Stato di Rete (IP)</div>
        <div id="network-info" class="text-muted" style="font-size: 0.85rem;">
            <p class="mb-0">Ricerca reti in corso...</p>
        </div>
    </div>

    <div class="card p-3 border-success">
        <div class="section-title text-success">🎧 Uscita Audio (ALSA)</div>
        <p class="text-muted small mb-2">Seleziona la scheda audio su cui far uscire il suono di FluidSynth.</p>
        <select id="audio-select" class="form-select mb-2">
            <option value="">Ricerca schede audio in corso...</option>
        </select>
    </div>

    <div class="card p-3 border-warning">
        <div class="section-title text-warning">🎹 Ingresso MIDI</div>
        <p class="text-muted small mb-2">Seleziona la tastiera o il controller collegato via USB.</p>
        <select id="midi-select" class="form-select mb-2">
            <option value="">Ricerca dispositivi MIDI in corso...</option>
        </select>
    </div>

    <div class="d-grid gap-2 mt-4">
        <button id="btn-save" class="btn btn-danger fw-bold py-3" onclick="saveAndRestart()">
            💾 SALVA E RIAVVIA MATSYNTH
        </button>
        <small class="text-center text-muted mt-1">Il riavvio richiederà circa 5 secondi.</small>
    </div>

    <script>
        // Questa funzione viene chiamata all'apertura della pagina
        async function loadSettings() {
            try {
                // 1. CHIEDE AL SERVER GLI INDIRIZZI IP
                const resNet = await fetch('/api/network');
                const netData = await resNet.json();
                
                let netHtml = `<strong class="text-white">Hostname:</strong> ${netData.hostname}.local<br><br>`;
                netHtml += `<strong class="text-white">Indirizzi disponibili:</strong><br>`;
                if (netData.ips.length === 0) {
                    netHtml += `- Nessuna rete trovata (Solo USB locale)<br>`;
                } else {
                    netData.ips.forEach(ip => {
                        // Evidenzia visivamente se è un IP locale classico (192.168...)
                        let badgeClass = ip.startsWith('192.168') ? 'bg-info text-dark' : 'bg-secondary';
                        netHtml += `<span class="badge ${badgeClass} fs-6 mt-1 mb-1">${ip}</span><br>`;
                    });
                }
                document.getElementById('network-info').innerHTML = netHtml;

                // 2. CHIEDE AL SERVER LE SCHEDE AUDIO
                const resAudio = await fetch('/api/audio_devices');
                const audioData = await resAudio.json();
                const audioSelect = document.getElementById('audio-select');
                audioSelect.innerHTML = ''; // Svuota il menu
                
                audioData.devices.forEach(dev => {
                    let opt = document.createElement('option');
                    opt.value = dev.id;         // Es: "hw:1,0"
                    opt.innerHTML = dev.name;   // Es: "USB Audio DAC"
                    if (dev.id === audioData.current) opt.selected = true;
                    audioSelect.appendChild(opt);
                });

                // 3. CHIEDE AL SERVER LE TASTIERE MIDI
                const resMidi = await fetch('/api/midi_devices');
                const midiData = await resMidi.json();
                const midiSelect = document.getElementById('midi-select');
                midiSelect.innerHTML = ''; // Svuota il menu
                
                midiData.devices.forEach(dev => {
                    let opt = document.createElement('option');
                    opt.value = dev.id;         // Es: "24:0"
                    opt.innerHTML = dev.name;   // Es: "Fantom-08 MIDI 1"
                    if (dev.id === midiData.current) opt.selected = true;
                    midiSelect.appendChild(opt);
                });

            } catch (e) {
                console.error("Errore di comunicazione col Raspberry:", e);
                document.getElementById('network-info').innerHTML = "<span class='text-danger'>Errore di connessione al server.</span>";
            }
        }

        // Funzione per salvare le scelte e riavviare FluidSynth
        async function saveAndRestart() {
            const btn = document.getElementById('btn-save');
            btn.innerText = "⏳ SALVATAGGIO IN CORSO...";
            btn.classList.replace('btn-danger', 'btn-warning');
            btn.disabled = true;

            const audioDev = document.getElementById('audio-select').value;
            const midiDev = document.getElementById('midi-select').value;

            try {
                // Invia i dati al file Python
                await fetch('/api/save_hardware', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ audio: audioDev, midi: midiDev })
                });
                
                btn.innerText = "🔄 RIAVVIO DEL MOTORE AUDIO...";
                btn.classList.replace('btn-warning', 'btn-success');
                
                // Attende 5 secondi affinché FluidSynth si spenga e si riaccenda, poi torna alla Home
                setTimeout(() => {
                    window.location.href = "/";
                }, 5000);

            } catch (e) {
                alert("Errore durante il salvataggio! Controlla la connessione.");
                btn.innerText = "💾 SALVA E RIAVVIA MATSYNTH";
                btn.classList.replace('btn-warning', 'btn-danger');
                btn.disabled = false;
            }
        }

        // Carica i dati appena la pagina è pronta
        window.onload = loadSettings;
    </script>
</body>
</html>
